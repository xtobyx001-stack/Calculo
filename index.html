<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MultiExtract</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

*, *::before, *::after { box-sizing: border-box !important; margin: 0 !important; padding: 0 !important; }

body {
background: #0d0d0d !important;
color: #f0f0f0 !important;
font-family: ‘Syne’, sans-serif !important;
min-height: 100vh !important;
display: flex !important;
flex-direction: column !important;
align-items: center !important;
padding: 36px 18px !important;
}

header {
width: 100% !important;
max-width: 820px !important;
margin-bottom: 40px !important;
display: flex !important;
align-items: baseline !important;
flex-wrap: wrap !important;
gap: 10px !important;
}

h1 {
font-size: clamp(2rem, 6vw, 3rem) !important;
font-weight: 800 !important;
letter-spacing: -0.03em !important;
line-height: 1 !important;
color: #f0f0f0 !important;
}

h1 span { color: #e8ff47 !important; }

.tagline {
font-family: ‘Space Mono’, monospace !important;
font-size: 0.68rem !important;
color: #666666 !important;
letter-spacing: 0.1em !important;
text-transform: uppercase !important;
margin-left: auto !important;
}

/* FIX #7: transition restaurado en drop-zone */
.drop-zone {
width: 100% !important;
max-width: 820px !important;
border: 2px dashed #2a2a2a !important;
border-radius: 6px !important;
padding: 52px 24px !important;
text-align: center !important;
cursor: pointer !important;
background: #161616 !important;
position: relative !important;
transition: border-color 0.2s, background 0.2s !important;
}

.drop-zone.drag-over {
border-color: #e8ff47 !important;
background: #181a0a !important;
}

.drop-zone input[type=“file”] {
position: absolute !important;
inset: 0 !important;
opacity: 0 !important;
cursor: pointer !important;
width: 100% !important;
height: 100% !important;
}

.drop-icon { font-size: 2.8rem !important; display: block !important; margin-bottom: 14px !important; }

.drop-title {
font-size: 1.1rem !important;
font-weight: 700 !important;
color: #f0f0f0 !important;
margin-bottom: 8px !important;
}

.drop-sub {
font-family: ‘Space Mono’, monospace !important;
font-size: 0.68rem !important;
color: #666666 !important;
}

.queue {
width: 100% !important;
max-width: 820px !important;
margin-top: 28px !important;
display: none !important;
flex-direction: column !important;
gap: 10px !important;
}

.queue.visible { display: flex !important; }

.queue-header {
display: flex !important;
justify-content: space-between !important;
align-items: center !important;
padding-bottom: 12px !important;
border-bottom: 1px solid #2a2a2a !important;
}

.queue-label {
font-family: ‘Space Mono’, monospace !important;
font-size: 0.68rem !important;
letter-spacing: 0.15em !important;
text-transform: uppercase !important;
color: #666666 !important;
}

.queue-count {
font-weight: 800 !important;
color: #e8ff47 !important;
font-size: 0.82rem !important;
}

.file-card {
background: #161616 !important;
border: 1px solid #2a2a2a !important;
border-radius: 4px !important;
padding: 14px 16px !important;
display: grid !important;
grid-template-columns: 1fr auto auto !important;
align-items: center !important;
gap: 10px !important;
}

.file-card.done       { border-color: #47ffb8 !important; }
.file-card.error      { border-color: #ff4757 !important; }
.file-card.processing { border-color: #e8ff47 !important; }

.file-name {
font-weight: 700 !important;
font-size: 0.88rem !important;
white-space: nowrap !important;
overflow: hidden !important;
text-overflow: ellipsis !important;
color: #f0f0f0 !important;
}

.file-size {
font-family: ‘Space Mono’, monospace !important;
font-size: 0.66rem !important;
color: #666666 !important;
margin-top: 3px !important;
}

.file-status {
font-family: ‘Space Mono’, monospace !important;
font-size: 0.68rem !important;
padding: 4px 10px !important;
border-radius: 2px !important;
white-space: nowrap !important;
}

.status-waiting    { color: #666666 !important; background: #1f1f1f !important; }
.status-processing { color: #e8ff47 !important; background: #1a1a0a !important; }
.status-done       { color: #47ffb8 !important; background: #0a1f17 !important; }
.status-error      { color: #ff4757 !important; background: #1f0a0a !important; }

.remove-btn {
background: none !important;
border: none !important;
color: #666666 !important;
cursor: pointer !important;
font-size: 1rem !important;
padding: 2px 6px !important;
border-radius: 2px !important;
}

.remove-btn:disabled { opacity: 0.3 !important; cursor: not-allowed !important; }

.progress-bar {
grid-column: 1 / -1 !important;
height: 3px !important;
background: #2a2a2a !important;
border-radius: 2px !important;
overflow: hidden !important;
display: none !important;
}

.progress-bar.active { display: block !important; }

/* FIX #6: transition en fill separado para compatibilidad Safari iOS */
.progress-fill {
height: 100% !important;
background: #e8ff47 !important;
width: 0% !important;
border-radius: 2px !important;
-webkit-transition: width 0.3s ease !important;
transition: width 0.3s ease !important;
}

.actions {
width: 100% !important;
max-width: 820px !important;
margin-top: 20px !important;
display: none !important;
gap: 12px !important;
}

.actions.visible { display: flex !important; }

.btn {
font-family: ‘Syne’, sans-serif !important;
font-weight: 700 !important;
font-size: 0.85rem !important;
letter-spacing: 0.05em !important;
text-transform: uppercase !important;
padding: 16px 24px !important;
border: none !important;
border-radius: 4px !important;
cursor: pointer !important;
}

.btn:disabled { opacity: 0.3 !important; cursor: not-allowed !important; }

.btn-primary {
background: #e8ff47 !important;
color: #0d0d0d !important;
flex: 1 !important;
}

.btn-secondary {
background: #161616 !important;
color: #f0f0f0 !important;
border: 1px solid #2a2a2a !important;
}

.global-bar {
width: 100% !important;
max-width: 820px !important;
margin-top: 18px !important;
display: none !important;
flex-direction: column !important;
gap: 6px !important;
}

.global-bar.visible { display: flex !important; }

.global-bar-label {
font-family: ‘Space Mono’, monospace !important;
font-size: 0.68rem !important;
color: #666666 !important;
display: flex !important;
justify-content: space-between !important;
}

.global-bar-track {
height: 6px !important;
background: #2a2a2a !important;
border-radius: 3px !important;
overflow: hidden !important;
}

.global-bar-fill {
height: 100% !important;
background: #e8ff47 !important;
width: 0% !important;
border-radius: 3px !important;
-webkit-transition: width 0.3s ease !important;
transition: width 0.3s ease !important;
}

.log {
width: 100% !important;
max-width: 820px !important;
margin-top: 24px !important;
background: #161616 !important;
border: 1px solid #2a2a2a !important;
border-radius: 4px !important;
padding: 14px 18px !important;
font-family: ‘Space Mono’, monospace !important;
font-size: 0.68rem !important;
color: #666666 !important;
max-height: 150px !important;
overflow-y: auto !important;
display: none !important;
flex-direction: column !important;
gap: 4px !important;
}

.log.visible { display: flex !important; }
.log-line      { line-height: 1.6 !important; color: #666666 !important; }
.log-line.ok   { color: #47ffb8 !important; }
.log-line.err  { color: #ff4757 !important; }
.log-line.info { color: #e8ff47 !important; }

.note {
font-family: ‘Space Mono’, monospace !important;
font-size: 0.66rem !important;
color: #444444 !important;
margin-top: 24px !important;
max-width: 820px !important;
text-align: center !important;
line-height: 1.9 !important;
}

.note strong { color: #ff6b35 !important; }
</style>

</head>
<body>

<header>
  <h1>Multi<span>Extract</span></h1>
  <span class="tagline">ZIP múltiple → un solo archivo</span>
</header>

<div class="drop-zone" id="dropZone">
  <input type="file" id="fileInput" multiple accept=".zip">
  <span class="drop-icon">📦</span>
  <div class="drop-title">Toca para seleccionar tus ZIPs</div>
  <div class="drop-sub">Todo se empaqueta en un solo ZIP de salida</div>
</div>

<div class="queue" id="queue">
  <div class="queue-header">
    <span class="queue-label">Cola</span>
    <span class="queue-count" id="queueCount">0 archivos</span>
  </div>
  <div id="fileList"></div>
</div>

<div class="actions" id="actions">
  <button class="btn btn-primary" id="extractBtn">⚡ Extraer todo</button>
  <button class="btn btn-secondary" id="clearBtn">Limpiar</button>
</div>

<div class="global-bar" id="globalBar">
  <div class="global-bar-label">
    <span>Progreso total</span>
    <span id="globalPct">0%</span>
  </div>
  <div class="global-bar-track">
    <div class="global-bar-fill" id="globalFill"></div>
  </div>
</div>

<div class="log" id="log"></div>

<p class="note">
  Solo soporta <strong>.ZIP</strong> — para RAR / 7z usa <strong>ZArchiver</strong> en Android.
</p>

<script>
  // ── Estado global ──────────────────────────────────────────────
  const files = [];       // { file, id (string), status, zipData (ArrayBuffer|null) }
  let extracting = false;
  const LOG_MAX = 200;    // FIX #9: cap del log

  // ── Referencias DOM ───────────────────────────────────────────
  const dropZone   = document.getElementById('dropZone');
  const fileInput  = document.getElementById('fileInput');
  const queue      = document.getElementById('queue');
  const fileList   = document.getElementById('fileList');
  const actions    = document.getElementById('actions');
  const extractBtn = document.getElementById('extractBtn');
  const clearBtn   = document.getElementById('clearBtn');
  const queueCount = document.getElementById('queueCount');
  const logEl      = document.getElementById('log');
  const globalBar  = document.getElementById('globalBar');
  const globalFill = document.getElementById('globalFill');
  const globalPct  = document.getElementById('globalPct');

  // ── Eventos ───────────────────────────────────────────────────
  extractBtn.addEventListener('click', extractAll);

  // FIX #4: Limpiar bloqueado durante extracción
  clearBtn.addEventListener('click', () => {
    if (extracting) return;
    clearAll();
  });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    addFiles([...e.dataTransfer.files]);
  });
  fileInput.addEventListener('change', () => {
    addFiles([...fileInput.files]);
    fileInput.value = '';
  });

  // ── Helpers ───────────────────────────────────────────────────

  // FIX #2: escape de texto para evitar XSS al usar innerHTML
  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function formatSize(bytes) {
    if (bytes < 1024) return `${bytes} B`;
    if (bytes < 1048576) return `${(bytes / 1024).toFixed(1)} KB`;
    return `${(bytes / 1048576).toFixed(2)} MB`;
  }

  function setGlobal(pct) {
    globalFill.style.width = pct + '%';
    globalPct.textContent = Math.round(pct) + '%';
  }

  // FIX #9: log con cap máximo de LOG_MAX líneas
  function addLog(msg, type = 'info') {
    logEl.classList.add('visible');
    // Quitar líneas viejas si supera el límite
    while (logEl.children.length >= LOG_MAX) {
      logEl.removeChild(logEl.firstChild);
    }
    const line = document.createElement('div');
    line.className = `log-line ${type}`;
    // textContent es seguro — no parsea HTML
    line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
  }

  // ── Gestión de archivos ───────────────────────────────────────
  function addFiles(newFiles) {
    newFiles.forEach(f => {
      if (!f.name.toLowerCase().endsWith('.zip')) {
        addLog(`"${f.name}" no es ZIP — omitido.`, 'err');
        return;
      }
      // Deduplicación por nombre + tamaño
      if (files.find(x => x.file.name === f.name && x.file.size === f.size)) return;
      // FIX #3: id como string desde el inicio para comparación segura con ===
      const id = `${Date.now()}-${Math.random().toString(36).slice(2)}`;
      files.push({ file: f, id, status: 'waiting', zipData: null });
    });
    renderList();
  }

  // FIX #10: renderList solo actualiza cards individuales durante extracción
  // para evitar el flash/destrucción del DOM en cada iteración
  function renderList() {
    const hasFiles = files.length > 0;
    queue.classList.toggle('visible', hasFiles);
    actions.classList.toggle('visible', hasFiles);

    if (!hasFiles) {
      fileList.innerHTML = '';
      return;
    }

    queueCount.textContent = `${files.length} archivo${files.length > 1 ? 's' : ''}`;

    // Identificar qué cards ya existen en el DOM
    const existingIds = new Set([...fileList.querySelectorAll('.file-card')].map(el => el.dataset.id));

    files.forEach(entry => {
      const statusMap = {
        waiting:    ['waiting',     'status-waiting'],
        processing: ['extrayendo…', 'status-processing'],
        done:       ['✓ listo',     'status-done'],
        error:      ['✗ error',     'status-error']
      };
      const [label, cls] = statusMap[entry.status] || statusMap.waiting;
      const safeName = escapeHtml(entry.file.name); // FIX #2

      if (existingIds.has(entry.id)) {
        // Card ya existe — solo actualizar partes que cambian
        const card = fileList.querySelector(`[data-id="${entry.id}"]`);
        if (!card) return;
        card.className = `file-card ${entry.status !== 'waiting' ? entry.status : ''}`;
        const statusEl = card.querySelector('.file-status');
        if (statusEl) { statusEl.className = `file-status ${cls}`; statusEl.textContent = label; }
        const removeEl = card.querySelector('.remove-btn');
        if (removeEl) removeEl.disabled = extracting;
        const bar = card.querySelector('.progress-bar');
        if (bar) bar.classList.toggle('active', entry.status === 'processing');
      } else {
        // Card nueva — crear e insertar
        const card = document.createElement('div');
        card.className = `file-card ${entry.status !== 'waiting' ? entry.status : ''}`;
        card.dataset.id = entry.id;
        card.innerHTML = `
          <div>
            <div class="file-name">${safeName}</div>
            <div class="file-size">${formatSize(entry.file.size)}</div>
          </div>
          <span class="file-status ${cls}">${label}</span>
          <button class="remove-btn" data-remove="${entry.id}" ${extracting ? 'disabled' : ''}>✕</button>
          <div class="progress-bar" id="bar-${entry.id}">
            <div class="progress-fill" id="fill-${entry.id}"></div>
          </div>
        `;
        // FIX #2: evento delegado en vez de onclick inline con id en el string
        card.querySelector('.remove-btn').addEventListener('click', () => removeFile(entry.id));
        fileList.appendChild(card);
      }
    });

    // Eliminar cards huérfanas (archivo fue removido)
    const currentIds = new Set(files.map(f => f.id));
    fileList.querySelectorAll('.file-card').forEach(el => {
      if (!currentIds.has(el.dataset.id)) el.remove();
    });
  }

  function removeFile(id) {
    if (extracting) return;
    // FIX #3: comparación estricta === (id ya es string en ambos lados)
    const i = files.findIndex(f => f.id === id);
    if (i >= 0) files.splice(i, 1);
    renderList();
  }

  function clearAll() {
    if (extracting) return; // FIX #4: doble guarda
    files.length = 0;
    logEl.innerHTML = '';
    logEl.classList.remove('visible');
    globalBar.classList.remove('visible');
    renderList();
  }

  // ── Extracción ────────────────────────────────────────────────
  async function extractAll() {
    if (extracting) return;

    const pending = files.filter(f => f.status === 'waiting' || f.status === 'error');
    if (!pending.length) { addLog('No hay archivos pendientes.', 'err'); return; }

    extracting = true;
    extractBtn.disabled = true;
    clearBtn.disabled = true; // FIX #4: bloquear Limpiar visualmente también
    globalBar.classList.add('visible');
    setGlobal(0);
    addLog(`Iniciando — ${pending.length} ZIP(s) → 1 archivo de salida`, 'info');

    const outputZip = new JSZip();
    let totalFiles  = 0;
    let processed   = 0;
    let anySuccess  = false;

    // FIX #1: leer cada ZIP UNA sola vez y guardar el ArrayBuffer en entry.zipData
    addLog('Leyendo archivos…', 'info');
    for (const entry of pending) {
      try {
        entry.zipData = await entry.file.arrayBuffer();
        const z = await JSZip.loadAsync(entry.zipData);
        totalFiles += Object.keys(z.files).filter(n => !z.files[n].dir).length;
      } catch(e) {
        entry.status  = 'waiting'; // se marcará error en la segunda pasada
        entry.zipData = null;
      }
    }

    // Segunda pasada: extraer usando el buffer ya leído
    for (const entry of pending) {
      entry.status = 'processing';
      renderList();

      const bar  = document.getElementById(`bar-${entry.id}`);
      const fill = document.getElementById(`fill-${entry.id}`);
      if (bar) bar.classList.add('active');

      // FIX #1: reusar entry.zipData en vez de releer el archivo
      if (!entry.zipData) {
        entry.status = 'error';
        addLog(`✗ No se pudo leer "${escapeHtml(entry.file.name)}"`, 'err');
        renderList();
        continue;
      }

      try {
        const zip    = await JSZip.loadAsync(entry.zipData);
        const names  = Object.keys(zip.files).filter(n => !zip.files[n].dir);
        const folder = entry.file.name.replace(/\.zip$/i, '');
        let localDone = 0;

        for (const name of names) {
          const data = await zip.files[name].async('uint8array');
          outputZip.file(`${folder}/${name}`, data);
          localDone++;
          processed++;
          // FIX #8: sin setTimeout artificial — actualización directa
          if (fill) fill.style.width = Math.round((localDone / names.length) * 100) + '%';
          if (totalFiles > 0) setGlobal((processed / totalFiles) * 100);
          // FIX #9: log solo cada 10 archivos para no saturar el DOM
          if (localDone === 1 || localDone % 10 === 0 || localDone === names.length) {
            addLog(`+ ${folder}/ (${localDone}/${names.length})`, 'ok');
          }
          // Ceder el hilo al navegador sin delay fijo
          if (localDone % 20 === 0) await new Promise(r => setTimeout(r, 0));
        }

        entry.status = 'done';
        anySuccess   = true;
        entry.zipData = null; // liberar memoria
        addLog(`✓ "${entry.file.name}" — ${names.length} archivo(s)`, 'ok');
      } catch(err) {
        entry.status  = 'error';
        entry.zipData = null;
        addLog(`✗ Error en "${entry.file.name}": ${err.message}`, 'err');
      }

      renderList();
    }

    // FIX #11: solo generar ZIP si hubo al menos un éxito
    if (!anySuccess) {
      addLog('✗ Ningún archivo se procesó correctamente. ZIP de salida cancelado.', 'err');
    } else {
      addLog('Generando ZIP de salida…', 'info');
      try {
        const blob = await outputZip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = 'extraidos.zip';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 5000);
        addLog('✓ "extraidos.zip" descargado.', 'ok');
        setGlobal(100);
      } catch(err) {
        addLog(`✗ Error generando ZIP: ${err.message}`, 'err');
      }
    }

    extracting = false;
    extractBtn.disabled = false;
    clearBtn.disabled = false; // FIX #4: desbloquear Limpiar al terminar
  }
</script>

</body>
</html>
